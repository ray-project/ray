# Ray's Python source lives under the python/ directory.
# Without this, pyrefly infers the import root as src/ and fails to resolve any ray.* imports.
search-path = ["python"]

project-includes = [
    "python/ray/data/**/*.py",
]

ignore-missing-imports = [
    "IPython.*",
    "PIL.*",
    "bson.*",
    "clickhouse_connect.*",
    "cloudpickle.*",
    "crc32c.*",
    "daft.*",
    "dask.*",
    "datasets.*",
    "datasketches.*",
    "decord.*",
    "delta_sharing.*",
    "deltalake.*",
    "fastavro.*",
    "freezegun.*",
    "fsspec.*",
    "google.cloud.*",
    "hudi.*",
    "ipywidgets.*",
    "kafka.*",
    "lance.*",
    "mars.*",
    "mcap.*",
    "modin.*",
    "numpy.*",
    "obstore.*",
    "pandas.*",
    "polars.*",
    "psutil.*",
    "pyarrow.*",
    "pyiceberg.*",
    "pymongo.*",
    "pymongoarrow.*",
    "pymysql.*",
    "pyspark.*",
    "pytest.*",
    "pytest_lazy_fixtures.*",
    "ray.core.generated.*",
    "raydp.*",
    "rich.*",
    "snappy.*",
    "snowflake.*",
    "soundfile.*",
    "tensorflow.*",
    "tensorflow_datasets.*",
    "tensorflow_metadata.*",
    "testcontainers.*",
    "torch.*",
    "torchvision.*",
    "tqdm.*",
    "transformers.*",
    "webdataset.*",
    "cudf.*",
    "pylibcudf.*",
    "pynvml.*",
    "rapidsmpf.*",
    "rmm.*",
    "confluent_kafka.*",
]

# zarr and numcodecs are installed in the data test images, so pyrefly resolves
# their (strict) stubs -- but read_zarr targets their largely-untyped runtime
# API, and the tests use it accordingly (e.g. str store paths, a custom codec).
# Treat them as Any: ``ignore-missing-imports`` only applies to modules that
# can't be found, not installed ones, so these belong here instead.
replace-imports-with-any = [
    "zarr.*",
    "numcodecs.*",
]
