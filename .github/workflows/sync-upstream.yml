# Periodic sync from upstream ray-project/ray — AIFQA-205
name: Sync from upstream ray-project/ray

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ray-project/ray.git || true

      - name: Fetch upstream
        run: |
          git fetch upstream --tags

      - name: Merge upstream/master into main
        run: |
          git checkout main
          git merge upstream/master --no-edit --allow-unrelated-histories || {
            echo '::warning::Merge conflict detected – manual resolution required.'
            exit 1
          }
          git push origin main

      - name: Sync release branches
        shell: bash
        run: |
          for branch in $(git branch -r | grep 'upstream/releases/' | sed 's|upstream/||'); do
            echo "Syncing $branch"
            git checkout -B "$branch" "upstream/$branch"
            git push origin "$branch" --force
          done
