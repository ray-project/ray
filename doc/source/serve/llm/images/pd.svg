<?xml version="1.0" encoding="UTF-8"?>
<!-- Do not edit this file with editors other than draw.io / diagrams.net -->
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="620px" height="560px" viewBox="-0.5 -0.5 620 560" content="&lt;mxfile host=&quot;app.diagrams.net&quot;&gt;&lt;diagram name=&quot;PD Request Flow&quot; id=&quot;pd-flow&quot;&gt;&lt;mxGraphModel dx=&quot;620&quot; dy=&quot;560&quot; grid=&quot;1&quot; gridSize=&quot;10&quot; guides=&quot;1&quot; tooltips=&quot;1&quot; connect=&quot;1&quot; arrows=&quot;1&quot; fold=&quot;1&quot; page=&quot;1&quot; pageScale=&quot;1&quot; pageWidth=&quot;620&quot; pageHeight=&quot;560&quot;&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;mxCell id=&quot;client&quot; value=&quot;Client&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;strokeWidth=2;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;20&quot; y=&quot;15&quot; width=&quot;80&quot; height=&quot;35&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;ingress&quot; value=&quot;Ingress&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;strokeWidth=2;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;150&quot; y=&quot;15&quot; width=&quot;80&quot; height=&quot;35&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;decode&quot; value=&quot;PDDecodeServer&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;strokeWidth=2;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;275&quot; y=&quot;15&quot; width=&quot;120&quot; height=&quot;35&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;mxCell id=&quot;prefill&quot; value=&quot;Prefill&quot; style=&quot;rounded=0;whiteSpace=wrap;html=1;strokeWidth=2;&quot; vertex=&quot;1&quot; parent=&quot;1&quot;&gt;&lt;mxGeometry x=&quot;470&quot; y=&quot;15&quot; width=&quot;80&quot; height=&quot;35&quot; as=&quot;geometry&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  <g>
    <!-- ==================== HEADER BOXES ==================== -->
    <!-- Client -->
    <rect x="20" y="15" width="80" height="35" fill="white" stroke="black" stroke-width="2" pointer-events="all"/>
    <text x="60" y="37" fill="black" font-family="Helvetica" font-size="13px" text-anchor="middle" dominant-baseline="central" font-weight="bold">Client</text>

    <!-- Ingress -->
    <rect x="150" y="15" width="80" height="35" fill="white" stroke="black" stroke-width="2" pointer-events="all"/>
    <text x="190" y="37" fill="black" font-family="Helvetica" font-size="13px" text-anchor="middle" dominant-baseline="central" font-weight="bold">Ingress</text>

    <!-- PDDecodeServer -->
    <rect x="275" y="15" width="120" height="35" fill="white" stroke="black" stroke-width="2" pointer-events="all"/>
    <text x="335" y="37" fill="black" font-family="Helvetica" font-size="11px" text-anchor="middle" dominant-baseline="central" font-weight="bold">PDDecodeServer</text>

    <!-- Prefill -->
    <rect x="470" y="15" width="80" height="35" fill="white" stroke="black" stroke-width="2" pointer-events="all"/>
    <text x="510" y="37" fill="black" font-family="Helvetica" font-size="13px" text-anchor="middle" dominant-baseline="central" font-weight="bold">Prefill</text>

    <!-- ==================== LIFELINES (dashed vertical) ==================== -->
    <line x1="60" y1="50" x2="60" y2="540" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>
    <line x1="190" y1="50" x2="190" y2="540" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>
    <line x1="335" y1="50" x2="335" y2="540" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>
    <line x1="510" y1="50" x2="510" y2="540" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>

    <!-- ==================== SETUP PHASE ==================== -->
    <!-- PDDecodeServer: setup_kv_backend() -->
    <rect x="280" y="70" width="110" height="22" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="335" y="84" fill="black" font-family="Courier New, monospace" font-size="9px" text-anchor="middle" dominant-baseline="central">setup_kv_backend()</text>

    <!-- Prefill: setup_kv_backend() -->
    <rect x="455" y="70" width="110" height="22" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="510" y="84" fill="black" font-family="Courier New, monospace" font-size="9px" text-anchor="middle" dominant-baseline="central">setup_kv_backend()</text>

    <!-- PDDecodeServer: Engine start (pennant/flag shape) -->
    <path d="M 300 106 L 370 106 L 362 118 L 370 130 L 300 130 Z" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="332" y="120" fill="black" font-family="Helvetica" font-size="10px" text-anchor="middle" dominant-baseline="central">Engine start</text>

    <!-- Prefill: Engine start (pennant/flag shape) -->
    <path d="M 475 106 L 545 106 L 537 118 L 545 130 L 475 130 Z" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="507" y="120" fill="black" font-family="Helvetica" font-size="10px" text-anchor="middle" dominant-baseline="central">Engine start</text>

    <!-- .bind() labels -->
    <text x="335" y="148" fill="#666" font-family="Courier New, monospace" font-size="9px" text-anchor="middle">.bind()</text>
    <text x="510" y="148" fill="#666" font-family="Courier New, monospace" font-size="9px" text-anchor="middle">.bind()</text>

    <!-- ==================== SEPARATOR ==================== -->
    <line x1="10" y1="170" x2="610" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- ==================== REQUEST FLOW ==================== -->

    <!-- 1. Client → Ingress: /v1/completions -->
    <text x="20" y="195" fill="#666" font-family="Courier New, monospace" font-size="9px" font-style="italic">/v1/completions</text>
    <line x1="60" y1="205" x2="183" y2="205" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 2. Ingress → PDDecodeServer (routes request) -->
    <line x1="190" y1="230" x2="328" y2="230" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 3. PDDecodeServer → Prefill: p.completions.remote() -->
    <text x="355" y="255" fill="#666" font-family="Courier New, monospace" font-size="9px" font-style="italic">p.completions.remote()</text>
    <line x1="335" y1="265" x2="503" y2="265" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- 4. Prefill: engine.step() (activation box) -->
    <rect x="490" y="278" width="85" height="24" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="532" y="293" fill="black" font-family="Courier New, monospace" font-size="9px" text-anchor="middle" dominant-baseline="central">engine.step()</text>

    <!-- 5. Prefill → PDDecodeServer: Return 1 token + kv-cache metadata -->
    <text x="345" y="318" fill="#666" font-family="Helvetica" font-size="9px" text-anchor="middle" font-style="italic">Return 1 token (optional) +</text>
    <text x="345" y="330" fill="#666" font-family="Helvetica" font-size="9px" text-anchor="middle" font-style="italic">kv-cache metadata</text>
    <line x1="510" y1="340" x2="342" y2="340" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead-gray)"/>

    <!-- 6. PDDecodeServer: Augment request with kv-metadata (box) -->
    <rect x="290" y="355" width="110" height="40" rx="6" ry="6" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
    <text x="345" y="372" fill="#333" font-family="Helvetica" font-size="9px" text-anchor="middle" dominant-baseline="central">Augment request</text>
    <text x="345" y="384" fill="#333" font-family="Helvetica" font-size="9px" text-anchor="middle" dominant-baseline="central">with kv-metadata</text>

    <!-- 7. PDDecodeServer: engine.step() — LOCAL decode on own engine -->
    <rect x="293" y="410" width="85" height="24" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="335" y="425" fill="black" font-family="Courier New, monospace" font-size="9px" text-anchor="middle" dominant-baseline="central">engine.step()</text>

    <!-- 8. Return first token + done kv-cache transfer → Client -->
    <text x="200" y="450" fill="#666" font-family="Helvetica" font-size="9px" text-anchor="middle" font-style="italic">Return the first token + done kv-cache transfer</text>
    <line x1="335" y1="460" x2="67" y2="460" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead-gray)"/>

    <!-- 9. PDDecodeServer: engine.step() — continued LOCAL decode -->
    <rect x="293" y="475" width="85" height="24" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
    <text x="335" y="490" fill="black" font-family="Courier New, monospace" font-size="9px" text-anchor="middle" dominant-baseline="central">engine.step()</text>

    <!-- 10. Second token, third token, etc. → Client -->
    <text x="200" y="515" fill="#666" font-family="Helvetica" font-size="9px" text-anchor="middle" font-style="italic">Second token, third token, etc.</text>
    <line x1="335" y1="520" x2="67" y2="520" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead-gray)"/>
  </g>
  <switch>
    <g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"/>
    <a transform="translate(0,-5)" xlink:href="https://www.diagrams.net/doc/faq/svg-export-text-problems" target="_blank">
      <text text-anchor="middle" font-size="10px" x="50%" y="100%">Text is not SVG - cannot display</text>
    </a>
  </switch>
</svg>
