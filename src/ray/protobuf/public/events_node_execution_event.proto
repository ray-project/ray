syntax = "proto3";

import "google/protobuf/timestamp.proto";

package ray.rpc;

// Message containing the execution information of a node, as observed via GCS.
// It can be used to capture the full state transition history.
//
// For static information associated with this event, see NodeDefinitionEvent.
message NodeExecutionEvent {
  enum State {
    ALIVE = 0;
    DEAD = 1;
  }

  message StateTimestamp {
    State state = 1;
    google.protobuf.Timestamp timestamp = 2;
  }

  message DeathInfo {
    enum Reason {
      UNSPECIFIED = 0;
      EXPECTED_TERMINATION = 1;
      UNEXPECTED_TERMINATION = 2;
      AUTOSCALER_DRAIN_PREEMPTED = 3;
      AUTOSCALER_DRAIN_IDLE = 4;
    }
    Reason reason = 1;
    string reason_message = 2;
  }

  bytes node_id = 1;
  repeated StateTimestamp states = 2;
  DeathInfo death_info = 3;
}
