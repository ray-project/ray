syntax = "proto3";

package ray.rpc.events;

message Source {
  // Platform that emitted the event, e.g. "kubernetes", "slurm".
  string platform = 1;
  
  // Component within the platform, e.g. "kubelet", "ray-operator".
  string component = 2;
  
  // Source-specific metadata, e.g. {"instance": "kubelet-xyzf", "namespace": "default"}.
  map<string, string> metadata = 3;
}

message PlatformEvent {
  string event_id = 1;

  // Component that emitted this event.
  Source source = 2;

  // Type of the resource this event is about, e.g. "Pod", "RayCluster", "Job".
  string object_kind = 3;

  // Name/identifier of the specific resource instance.
  string object_name = 4;

  // Human-readable description of the event.
  string message = 5;

  // Short, machine-understandable string for the event type, e.g. "OOMKilled".
  string reason = 6;

  // Timestamp of the event (ns since epoch). Maps to firstTimestamp or
  // lastTimestamp depending on the platform's event aggregation semantics.
  int64 timestamp_ns = 7;

  // Arbitrary key-value metadata for platform-specific extensions.
  map<string, string> custom_fields = 8;
}
