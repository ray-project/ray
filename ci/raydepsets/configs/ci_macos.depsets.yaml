build_arg_sets:
  py310:
    PYTHON_VERSION: "3.10"
    PYTHON_SHORT: "310"

depsets:
  - name: macos_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/test-requirements.txt
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    output: python/deplocks/ci/macos_depset_py${PYTHON_VERSION}.lock
    append_flags:
      - --python-version=${PYTHON_VERSION}
      - --python-platform=aarch64-apple-darwin
      - --unsafe-package ray
    build_arg_sets:
      - py310
    pre_hooks:
      - ci/raydepsets/pre_hooks/remove-compiled-headers.sh 3.13
