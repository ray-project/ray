build_arg_sets:
  cu128:
    PYTHON_VERSION: py314
    PYTHON_VERSION_STR: "3.14"
    CUDA_CODE: cu128
    # vLLM 0.22.0's default PyPI wheel is built against the CUDA 12.9 (cu129)
    # public torch release, so resolve the torch family from the cu129 index to
    # keep the prebuilt _C.abi3.so linkable. The lock filename keeps the cu128
    # tag because the base container is still cu128. Must match
    # rayllm.depsets.yaml's TORCH_CUDA_CODE.
    TORCH_CUDA_CODE: cu129


.common_settings: &common_settings
  append_flags:
    - --python-version=${PYTHON_VERSION_STR}
    - --unsafe-package ray
    - --python-platform=x86_64-manylinux_2_31
    - --index https://download.pytorch.org/whl/${TORCH_CUDA_CODE}
  build_arg_sets:
    - cu128

depsets:
  - name: subset_rayllm_depset_${PYTHON_VERSION}_${CUDA_CODE}
    operation: subset
    source_depset: compiled_ray_llm_depset_${PYTHON_VERSION}_${CUDA_CODE}
    <<: *common_settings
    requirements:
      - python/requirements.txt
    output: python/deplocks/llm/rayllm_subset_${PYTHON_VERSION}_${CUDA_CODE}.lock

  - name: llm_batch_single_node_benchmark_${PYTHON_VERSION}_${CUDA_CODE}
    operation: expand
    depsets:
      - subset_rayllm_depset_${PYTHON_VERSION}_${CUDA_CODE}
    <<: *common_settings
    requirements:
      - release/llm_tests/batch/requirements.in
    output: release/ray_release/byod/llm_batch/llm_batch_single_node_benchmark_${PYTHON_VERSION}_${CUDA_CODE}.lock
