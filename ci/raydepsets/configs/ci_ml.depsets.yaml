build_arg_sets:
  py310:
    PYTHON_VERSION: "3.10"
    PYTHON_SHORT: "310"
  py312:
    PYTHON_VERSION: "3.12"
    PYTHON_SHORT: "312"


depsets:
  - name: ci_ml_thirdparty_depset_${PYTHON_SHORT}
    operation: compile
    requirements:
      - python/requirements/ml/py313/third_party.txt
    output: python/deplocks/ci/ci_ml_thirdparty_depset_py${PYTHON_VERSION}.lock
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    append_flags:
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package pip
    build_arg_sets:
      - py310
      - py312
    pre_hooks:
      - ci/raydepsets/pre_hooks/remove-compiled-headers.sh 3.13

  - name: ci_ml_build_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/ml-requirements.txt
      - python/requirements/ml/py313/dl-cpu-requirements.txt
      - python/requirements/ml/py313/train-requirements.txt
      - python/requirements/ml/py313/train-test-requirements.txt
      - python/requirements/ml/py313/tune-requirements.txt
      - python/requirements/ml/py313/tune-test-requirements.txt
      - python/requirements/ml/py313/rllib-requirements.txt
      - python/requirements/ml/py313/rllib-test-requirements.txt
    output: python/deplocks/ci/ml-build-ci_depset_py${PYTHON_VERSION}.lock
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    append_flags:
      - --index https://download.pytorch.org/whl/cpu
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --unsafe-package pip
      # - --override python/deplocks/ci/ml-build-ci_depset_py${PYTHON_VERSION}.lock
    build_arg_sets:
      - py310
      - py312

  - name: ci_ml_gpubuild_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/ml-requirements.txt
      - python/requirements/ml/py313/dl-gpu-requirements.txt
      - python/requirements/ml/py313/train-requirements.txt
      - python/requirements/ml/py313/train-test-requirements.txt
      - python/requirements/ml/py313/tune-requirements.txt
      - python/requirements/ml/py313/tune-test-requirements.txt
      - python/requirements/ml/py313/rllib-requirements.txt
      - python/requirements/ml/py313/rllib-test-requirements.txt
    output: python/deplocks/ci/ml-gpubuild-ci_depset_py${PYTHON_VERSION}.lock
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    append_flags:
      - --index https://download.pytorch.org/whl/cu128
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --unsafe-package pip
    build_arg_sets:
      - py310
      - py312

  - name: ci_ml_lightning1gpubuild_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ci_ml_gpubuild_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/lightning1.txt
    output: python/deplocks/ci/ml-lightning1gpubuild-ci_depset_py${PYTHON_VERSION}.lock
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13_no_ptl.txt
    append_flags:
      - --index https://download.pytorch.org/whl/cu128
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --unsafe-package pip
    pre_hooks:
      - ci/raydepsets/pre_hooks/strip-pytorch-lightning-constraint.sh
    build_arg_sets:
      - py310
