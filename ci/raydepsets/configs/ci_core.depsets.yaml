build_arg_sets:
  py310:
    PYTHON_VERSION: "3.10"
    PYTHON_SHORT: "310"
  py312:
    PYTHON_VERSION: "3.12"
    PYTHON_SHORT: "312"

depsets:
  - name: core_ci_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/core-requirements.txt
      - python/requirements/py313/test-requirements.txt
      - python/requirements/ml/py313/dl-cpu-requirements.txt
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    output: python/deplocks/ci/core-build-ci_depset_py${PYTHON_VERSION}.lock
    append_flags:
      - --index https://download.pytorch.org/whl/cpu
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --prerelease=allow
    build_arg_sets:
      - py310
      - py312
    pre_hooks:
      - ci/raydepsets/pre_hooks/remove-compiled-headers.sh ${PYTHON_VERSION}

  - name: core_gpu_ci_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/core-requirements.txt
      - python/requirements/py313/test-requirements.txt
      - python/requirements/ml/py313/dl-gpu-requirements.txt
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    output: python/deplocks/ci/core-gpubuild-ci_depset_py${PYTHON_VERSION}.lock
    append_flags:
      - --index https://download.pytorch.org/whl/cu128
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --prerelease=allow
    build_arg_sets:
      - py310
      - py312

  - name: core_cu130_ci_depset_${PYTHON_SHORT}
    operation: expand
    depsets:
      - ray_img_depset_${PYTHON_SHORT}
    requirements:
      - python/requirements/ml/py313/core-requirements.txt
      - python/requirements/py313/test-requirements.txt
      - python/requirements/ml/py313/dl-gpu-requirements.txt
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.13.txt
    output: python/deplocks/ci/core-gpu-cu130-build-ci_depset_py${PYTHON_VERSION}.lock
    append_flags:
      - --index https://download.pytorch.org/whl/cu130
      - --python-version=${PYTHON_VERSION}
      - --python-platform=linux
      - --unsafe-package ray
      - --prerelease=allow
    build_arg_sets:
      - py310
      - py312
    pre_hooks:
      - ci/raydepsets/pre_hooks/remove-compiled-headers.sh ${PYTHON_VERSION}
