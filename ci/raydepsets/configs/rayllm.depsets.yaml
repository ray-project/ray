build_arg_sets:
  cpu:
    PYTHON_VERSION: py314
    PYTHON_VERSION_STR: "3.14"
    CUDA_CODE: cpu
    TORCH_CUDA_CODE: cpu
  cu128:
    PYTHON_VERSION: py314
    PYTHON_VERSION_STR: "3.14"
    # The py3.14 LLM image is built on the CUDA 12.8 base container, but vLLM
    # 0.22.0 and flashinfer-python 0.6.11.post2 ship CUDA-13 wheels: their
    # compiled extensions (e.g. vllm._C) link libcudart.so.13. Resolve the
    # torch family (torch/torchvision/torchaudio) from the cu130 index so torch
    # brings the matching CUDA-13 runtime; pulling torch from cu129 ships the
    # CUDA-12 runtime, leaving libcudart.so.13 unsatisfied so vLLM fails to
    # import with "libcudart.so.13: cannot open shared object file". The lock
    # filenames keep the cu128 tag because the base container is still cu128.
    CUDA_CODE: cu128
    TORCH_CUDA_CODE: cu130


.common_settings: &common_settings
  append_flags:
    - --python-version=${PYTHON_VERSION_STR}
    - --unsafe-package ray
    # Omit the nixl-cu13 binary wheel from the compiled lockfiles. nixl-cu12
    # and nixl-cu13 1.x wheels both install a top-level nixl_ep/ package with
    # an identically named nixl_ep_cpp.so but different libcudart
    # requirements. The torch family is resolved from the cu128 index, so
    # nixl-cu12 is the matching binary; exclude nixl-cu13 so the cuda13 wheel
    # can't win the file race and break vLLM's eager `import nixl_ep`. The
    # nixl meta-package (pure Python) is still required so examples like
    # dp_pd_example can `import nixl` to gate optional features.
    - --unsafe-package nixl-cu13
    - --python-platform=x86_64-manylinux_2_31
    - --index https://download.pytorch.org/whl/${TORCH_CUDA_CODE}
  build_arg_sets:
    - cpu
    - cu128

depsets:
# First, extract base test dependencies from the current compiled mono repo one.
# This also expands to the indirect dependencies for this Python version & platform.
  - name: ray_base_test_depset_${PYTHON_VERSION}_${CUDA_CODE}
    operation: compile
    <<: *common_settings
    requirements:
      - python/requirements.txt
      - python/requirements/cloud-requirements.txt
      - python/requirements/base-test-requirements.txt
    constraints:
      - /tmp/ray-deps/requirements_compiled_py3.14.txt
    output: python/deplocks/llm/ray_test_${PYTHON_VERSION}_${CUDA_CODE}.lock
    pre_hooks:
      - ci/raydepsets/pre_hooks/remove-compiled-headers.sh 3.14

# Second, expand it into LLM test dependencies.
  - name: compiled_ray_llm_test_depset_${PYTHON_VERSION}_${CUDA_CODE}
    <<: *common_settings
    operation: expand
    depsets:
      - ray_base_test_depset_${PYTHON_VERSION}_${CUDA_CODE}
    requirements:
      - python/requirements/llm/llm-requirements.txt
      - python/requirements/llm/llm-test-requirements.txt
    constraints:
      - python/deplocks/llm/ray_test_${PYTHON_VERSION}_${CUDA_CODE}.lock
    output: python/deplocks/llm/rayllm_test_${PYTHON_VERSION}_${CUDA_CODE}.lock

# Third, subset the base test dependencies into Ray dependencies.
  - name: compiled_ray_depset_${PYTHON_VERSION}_${CUDA_CODE}
    <<: *common_settings
    operation: subset
    source_depset: ray_base_test_depset_${PYTHON_VERSION}_${CUDA_CODE}
    requirements:
      - python/requirements.txt
    output: python/deplocks/llm/ray_${PYTHON_VERSION}_${CUDA_CODE}.lock

# Fourth, subset the LLM test dependencies into RayLLM dependencies.
  - name: compiled_ray_llm_depset_${PYTHON_VERSION}_${CUDA_CODE}
    <<: *common_settings
    operation: subset
    source_depset: compiled_ray_llm_test_depset_${PYTHON_VERSION}_${CUDA_CODE}
    requirements:
      - python/requirements.txt
      - python/requirements/llm/llm-requirements.txt
    output: python/deplocks/llm/rayllm_${PYTHON_VERSION}_${CUDA_CODE}.lock
