group: doc
steps:
  - name: docbuild
    label: "wanda: docbuild-py{{matrix}}"
    wanda: ci/docker/doc.build.wanda.yaml
    depends_on:
      - oss-ci-base_build-multipy(python=3.11)
      - ray-core-build(python=3.11)
      - ray-dashboard-build
    matrix:
      - "3.11"
    env:
      PYTHON: "{{matrix}}"
      REQUIREMENTS_FILE: "python/deplocks/docs/docbuild_depset_py{{matrix}}.lock"
    tags: cibase

  - name: docgpubuild
    label: "wanda: docgpubuild-py3.10"
    wanda: ci/docker/docgpu.build.wanda.yaml
    depends_on: oss-ci-base_gpu-multipy(python=3.10)
    env:
      PYTHON: "3.10"
    tags: cibase

  - label: ":book: doc: build"
    key: doc_build
    instance_type: medium
    commands:
      - bazel run //ci/ray_ci/doc:cmd_build
    depends_on: docbuild
    job_env: docbuild-py3.11
    tags:
      - oss
      - doc
      - skip-on-premerge

  - label: ":book: doc: check API annotations"
    tags:
      - oss
      - python
      - dashboard
      - ray_client
      - data
      - serve
      - ml
      - tune
      - train
      - llm
      - rllib
      - rllib_gpu
      - doc
    key: doc_api_annotations
    instance_type: medium
    depends_on: docbuild
    job_env: docbuild-py3.11
    commands:
      - bash ci/lint/lint.sh api_annotations

  - label: ":book: doc: check API doc consistency"
    tags:
      - oss
      - python
      - dashboard
      - ray_client
      - data
      - serve
      - ml
      - tune
      - train
      - llm
      - rllib
      - rllib_gpu
      - doc
    key: doc_api_policy_check
    instance_type: medium
    depends_on: docbuild
    job_env: docbuild-py3.11
    commands:
      - bash ci/lint/lint.sh api_policy_check

  - label: ":book: doc: linkcheck"
    key: doc_linkcheck
    instance_type: medium
    commands:
      - make -C doc/ linkcheck_all
    depends_on: docbuild
    job_env: docbuild-py3.11
    tags:
      - oss
      - skip-on-premerge
    soft_fail: true

  # Credential-free PR-time gate for doc/redirects/*.yaml. Selected by the
  # `doc_redirects` tag (see .buildkite/test.rules.txt), so a redirect-only PR runs
  # only this step and skips docbuild, the API checks, linkcheck, and team doc tests.
  # Runs in forge (no doc image), installs the pinned PyPI package, and uses no RtD
  # token, so it's safe on fork PRs.
  - label: ":book: doc: validate redirects"
    key: doc_redirects
    depends_on: forge
    tags:
      - oss
      - doc_redirects
    commands:
      - pip install --no-cache-dir anyscale-rtd-redirects==0.2.0
      # diff-file reads the base via `git show origin/<base>:<path>`, so resolve the
      # PR's base branch (falling back to master for non-PR builds) and ensure it's present.
      - git fetch -q origin "${BUILDKITE_PULL_REQUEST_BASE_BRANCH:-master}"
      - rtd-redirects validate doc/redirects/current.yaml
      - rtd-redirects diff-file --file doc/redirects/current.yaml --base "origin/${BUILDKITE_PULL_REQUEST_BASE_BRANCH:-master}" --head HEAD --repo .
