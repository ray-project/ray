cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '72'

  BlockDeviceMappings:
    - DeviceName: /dev/sda1
      Ebs:
        VolumeSize: 300
        DeleteOnTermination: true

head_node:
    instance_type: m5.xlarge

worker_nodes: []
