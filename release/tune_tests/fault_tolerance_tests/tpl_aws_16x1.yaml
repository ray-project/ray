cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

# Required to allow nodes to terminate themselves.
advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: chaos-test-name
          Value: 'tune-chaos-test'

head_node:
    instance_type: m5a.large
    resources:
      head: 1

worker_nodes:
    - instance_type: m5a.large
      min_nodes: 16
      max_nodes: 16
      market_type: SPOT
