cloud: {{env["ANYSCALE_CLOUD_NAME"]}}
zones: [us-west1-b]

advanced_instance_config:
    instance_properties:
        disks:
            - boot: true
              auto_delete: true
              initialize_params:
                  disk_size_gb: 150

head_node:
    instance_type: n2-standard-64
    resources:
        CPU: 64
        GPU: 64

worker_nodes: []
