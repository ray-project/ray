cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

head_node:
    instance_type: m5.2xlarge

worker_nodes:
    - instance_type: g4dn.12xlarge
      min_nodes: 4
      max_nodes: 4
      market_type: ON_DEMAND

advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'
