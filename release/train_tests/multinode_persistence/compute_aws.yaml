cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'

head_node:
    instance_type: m5.2xlarge
    # Test's wait_for_nodes: 4 > 3 workers — head must count as a usable node.
    resources:
      CPU: 8

worker_nodes:
    - instance_type: m5.2xlarge
      min_nodes: 3
      max_nodes: 3
      market_type: ON_DEMAND
