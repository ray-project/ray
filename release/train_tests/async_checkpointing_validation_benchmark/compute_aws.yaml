cloud_id: {{env["ANYSCALE_CLOUD_ID"]}}
region: us-west-2
# g4dn instances aren't supported in us-west-2d, so restrict to the
# AZs where they're available.
allowed_azs:
    - us-west-2a
    - us-west-2b
    - us-west-2c

max_workers: 4

head_node_type:
    name: head_node
    instance_type: m5.4xlarge

worker_node_types:
    - name: worker_node
      instance_type: g4dn.xlarge
      max_workers: 4
      min_workers: 2
      use_spot: false

advanced_configurations_json:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'
