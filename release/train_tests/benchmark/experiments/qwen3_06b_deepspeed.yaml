# Qwen3-0.6B + DeepSpeed ZeRO — P0 quick performance-regression workload.
#
# Cluster shape: 1x g5.48xlarge (8x A10G-24GB) single node — cheapest
# bf16-capable option. Activations (not params) are the memory constraint on
# 24GB: at batch x seq, eager attention's B*H*S*S scores OOM, so we use SDPA
# attention + gradient checkpointing and a modest batch. On A100-40GB you can
# raise batch_size to 8 and drop gradient_checkpointing.
#
# Pair with the torchrun launcher for a parity baseline (same node):
#   torchrun --nproc_per_node=8 -m core.runner \
#       --experiment experiments/qwen3_06b_deepspeed.yaml --launcher torchrun
name: qwen3_06b_deepspeed
launcher: ray
num_workers: 8                   # 8x A10G on a single g5.48xlarge node
use_gpu: true
model:
  adapter: deepspeed
  name: Qwen/Qwen3-0.6B          # HF model id; AutoModelForCausalLM.from_pretrained
  parallelism:
    zero_stage: 2                # 0.6B fits easily; stage 2 shards optimizer+grads,
                                 # avoids the extra param-gather comms of stage 3
  precision: bf16                # A10G supports bf16 natively
  attn_implementation: sdpa      # avoid eager attention's O(S^2) score matrix
  gradient_checkpointing: true   # fit activations on 24GB; trades ~30% recompute
data:
  dataloader: framework_default
  dataset: wikitext             # use `synthetic` to isolate compute from data ingest
  dataset_path: ""
  batch_size: 4                 # per-GPU micro batch; global = 4 x 8 = 32 seqs/step
  seq_len: 2048
  limit_training_rows: 8000
training:
  num_steps: 200
  warmup_steps: 10
  seed: 42
  log_every_n_steps: 20
  gradient_accumulation_steps: 1
  optimizer:
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.1
checkpoint:
  interval: 100
  at_end: false
perturbation: null
