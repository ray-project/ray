cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
    BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: true
            Iops: 5000
            Throughput: 1000
            VolumeSize: 200
            VolumeType: gp3

head_node:
    instance_type: m5.2xlarge

worker_nodes:
    - instance_type: m5.4xlarge
      min_nodes: 10
      max_nodes: 10
      market_type: ON_DEMAND
