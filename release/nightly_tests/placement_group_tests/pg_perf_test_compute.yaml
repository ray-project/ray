cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
    BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: true
            VolumeSize: 500

head_node:
    instance_type: m5.8xlarge
    resources:
        CPU: 32
        pending: 1
        custom: 100

worker_nodes:
    - instance_type: m5.4xlarge
      min_nodes: 4
      max_nodes: 4
      market_type: ON_DEMAND
      resources:
          CPU: 16
          pending: 1
          custom: 100
