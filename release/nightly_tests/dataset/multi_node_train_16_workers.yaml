cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

head_node:
    instance_type: g4dn.4xlarge
    # 16 training workers run across head + 15 workers (1 GPU each).
    resources:
        CPU: 16
        GPU: 1

worker_nodes:
    - instance_type: g4dn.4xlarge
      min_nodes: 15
      max_nodes: 15
      market_type: ON_DEMAND
