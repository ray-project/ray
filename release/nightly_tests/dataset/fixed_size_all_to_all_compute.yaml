cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
    BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: true
            VolumeSize: 512

head_node:
    instance_type: m5.2xlarge

worker_nodes:
    - instance_type: m5.4xlarge
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
