cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

head_node:
    instance_type: c5.2xlarge

worker_nodes: []

advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '48'

  BlockDeviceMappings:
    - DeviceName: /dev/sda1
      Ebs:
        VolumeSize: 300
        DeleteOnTermination: true
