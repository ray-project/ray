cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

head_node:
    instance_type: r5dn.16xlarge # Network optimized.
    resources:
      CPU: 0
      node: 1
      small: 1

worker_nodes:
    - instance_type: m5.16xlarge
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
      resources:
        node: 1
    - instance_type: r5.16xlarge
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
      resources:
        node: 1
