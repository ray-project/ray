cloud: {{env["ANYSCALE_CLOUD_NAME"]}}
zones:
    - us-west1-c

advanced_instance_config:
  instance_properties:
    disks:
      - boot: true
        auto_delete: true
        initialize_params:
          disk_size_gb: 500

head_node:
    instance_type: n2-standard-64
    resources:
      # 128 GB
      object_store_memory: 128000000000

worker_nodes: []
