cloud: {{env["ANYSCALE_CLOUD_NAME"]}}
zones:
    - us-west1-c

head_node:
    instance_type: n2-standard-64 # Network optimized.
    resources:
      cpu: 0
      custom_resources:
        node: 1
        small: 1

worker_nodes:
    - instance_type: n2-standard-64
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
      resources:
        custom_resources:
          node: 1
    - instance_type: n2-standard-64
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
      resources:
        custom_resources:
          node: 1
