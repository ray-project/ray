cloud_id: {{env["ANYSCALE_CLOUD_ID"]}}
region: us-west-2

# 646 min replicas needing ~1246 CPU at min scale.
# 32 CPU per worker node -> ceil(1246/32) = ~39 nodes needed at min.

max_workers: 200

head_node_type:
    name: head_node
    # 8 cpus, x86, 32G mem
    instance_type: m5.2xlarge

worker_node_types:
    - name: worker_node
      # 32 cpus, x86, 128G mem
      instance_type: m5.8xlarge
      min_workers: 5
      max_workers: 200
      use_spot: false

advanced_configurations_json:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'
