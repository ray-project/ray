cloud: {{env["ANYSCALE_CLOUD_NAME"]}}

advanced_instance_config:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'

head_node:
    # 32 cpus, x86, 128G mem, 10Gb NIC
    instance_type: m5.8xlarge

worker_nodes:
    # 32 cpus, x86, 128G mem, 10Gb NIC
    - instance_type: m5.8xlarge
      min_nodes: 32
      max_nodes: 32
      market_type: ON_DEMAND
      # New SDK's `resources` is a full override (not a merge with natural
      # instance resources), so include `CPU: 32` explicitly alongside the
      # custom `worker` resource.
      resources:
        CPU: 32
        worker: 1
