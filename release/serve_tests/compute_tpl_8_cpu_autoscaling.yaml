cloud_id: {{env["ANYSCALE_CLOUD_ID"]}}
region: us-west-2

# 4096 max replicas; ceil(4096 * 0.4 / 8) = 205 nodes needed; +15 buffer
# 0.4 cpu per replica
# 8 cpu per node
max_workers: 220

head_node_type:
    name: head_node
    # 8 cpus, x86, 32G mem, 10Gb NIC, $0.384/hr on demand
    instance_type: m5.2xlarge
    resources:
      custom_resources:
        proxy: 1
        CPU: 0

worker_node_types:
    - name: worker_node
      # 8 cpus, x86, 32G mem, 10Gb NIC, $0.384/hr on demand
      instance_type: m5.2xlarge
      # smaller min workers will make the head node cpu usage very high, and crash the head node.
      # issue: https://github.com/ray-project/ray/issues/18908
      min_workers: 5
      # 4096 max replicas
      max_workers: 220
      use_spot: false
      resources:
        custom_resources:
          proxy: 1

advanced_configurations_json:
  TagSpecifications:
    - ResourceType: "instance"
      Tags:
        - Key: ttl-hours
          Value: '24'
